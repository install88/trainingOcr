Global:
  model_name: PP-OCRv4_mobile_rec
  debug: false
  use_gpu: false   # AMD Radeon 無 CUDA，使用 CPU 訓練
  epoch_num: 200
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: C:/Users/andy_ac_chen/Desktop/claudeProject/output/rec/
  save_epoch_step: 10
  eval_batch_step: [0, 500]
  cal_metric_during_train: true
  # 放置預訓練權重路徑（下載後修改此行）
  pretrained_model: C:/Users/andy_ac_chen/Desktop/claudeProject/pretrained_models/PP-OCRv4_mobile_rec_train/best_accuracy
  checkpoints:
  save_inference_dir: C:/Users/andy_ac_chen/Desktop/claudeProject/output/rec/inference/
  use_visualdl: false
  infer_img:
  # 字元字典：使用 PaddleOCR 內建的中文字典
  character_dict_path: C:/Users/andy_ac_chen/Desktop/tool/PaddleOCR/ppocr/utils/ppocr_keys_v1.txt
  max_text_length: &max_text_length 25
  infer_mode: false
  use_space_char: true
  distributed: false  # 單 GPU 設為 false
  save_res_path: C:/Users/andy_ac_chen/Desktop/claudeProject/output/rec/predicts.txt
  d2s_train_image_shape: [3, 48, 320]


Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0005  # Fine-tune 時使用較小 lr
    warmup_epoch: 5
  regularizer:
    name: L2
    factor: 3.0e-05


Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: True
          Head:
            fc_decay: 0.00001
      - NRTRHead:
          nrtr_dim: 384
          max_text_length: *max_text_length

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - NRTRLoss:

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

Train:
  dataset:
    name: SimpleDataSet
    data_dir: C:/Users/andy_ac_chen/Desktop/claudeProject/dataset/rec/train/
    label_file_list:
      - C:/Users/andy_ac_chen/Desktop/claudeProject/dataset/rec/train_label.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - RecAug:
    - MultiLabelEncode:
        gtc_encode: NRTRLabelEncode
    - RecResizeImg:
        image_shape: [3, 48, 320]
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_gtc
        - length
        - valid_ratio
  loader:
    shuffle: true
    drop_last: true
    batch_size_per_card: 64   # 顯存不足時降低
    num_workers: 4            # Windows 建議 4 以下

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: C:/Users/andy_ac_chen/Desktop/claudeProject/dataset/rec/val/
    label_file_list:
      - C:/Users/andy_ac_chen/Desktop/claudeProject/dataset/rec/val_label.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - MultiLabelEncode:
        gtc_encode: NRTRLabelEncode
    - RecResizeImg:
        image_shape: [3, 48, 320]
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_gtc
        - length
        - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 64
    num_workers: 2
