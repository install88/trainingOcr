Global:
  model_name: PP-OCRv5_mobile_det
  debug: false
  use_gpu: false   # AMD Radeon 無 CUDA，使用 CPU 訓練（Colab 會用 -o 覆寫為 true）
  epoch_num: &epoch_num 100   # 三層標記資料量夠,100 epoch 足夠 (原本 200)
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: C:/Users/andy_ac_chen/Desktop/claudeProject/output/det_v5/
  save_epoch_step: 5          # 每 5 epoch 存 checkpoint (原本 10),救急更頻繁
  eval_batch_step:
  - 0
  - 500
  cal_metric_during_train: false
  checkpoints:
  # 放置預訓練權重路徑（Colab notebook 會下載 v5 完整 det pretrained 覆寫此路徑）
  pretrained_model: C:/Users/andy_ac_chen/Desktop/claudeProject/pretrained_models/PP-OCRv5_mobile_det_pretrained
  save_inference_dir: C:/Users/andy_ac_chen/Desktop/claudeProject/output/det_v5/inference/
  use_visualdl: false
  infer_img:
  save_res_path: C:/Users/andy_ac_chen/Desktop/claudeProject/output/det_v5/predicts_db.txt
  d2s_train_image_shape: [3, 640, 640]
  distributed: false  # 單 GPU 訓練設為 false

Architecture:
  model_type: det
  algorithm: DB
  Transform: null
  Backbone:
    name: PPLCNetV3
    scale: 0.75
    det: True
  Neck:
    name: RSEFPN
    out_channels: 96
    shortcut: True
  Head:
    name: DBHead
    k: 50
    fix_nan: True

Loss:
  name: DBLoss
  balance_loss: true
  main_loss_type: DiceLoss
  alpha: 5
  beta: 10
  ohem_ratio: 3

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0001  # 三層標記策略下用更小 lr,保護 pretrained 廣義能力 (原本 0.0005)
    warmup_epoch: 5        # 慢啟動,前 5 epoch 線性 ramp-up (原本 2)
  regularizer:
    name: L2
    factor: 5.0e-05

PostProcess:
  name: DBPostProcess
  thresh: 0.3
  box_thresh: 0.6
  max_candidates: 1000
  unclip_ratio: 1.5

Metric:
  name: DetMetric
  main_indicator: hmean

Train:
  dataset:
    name: SimpleDataSet
    data_dir: C:/Users/andy_ac_chen/Desktop/claudeProject/dataset/det/train/
    label_file_list:
      - C:/Users/andy_ac_chen/Desktop/claudeProject/dataset/det/train_label.txt
    ratio_list: [1.0]
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - DetLabelEncode: null
    - CopyPaste: null
    - IaaAugment:
        augmenter_args:
        - type: Fliplr
          args:
            p: 0.5
        - type: Affine
          args:
            rotate:
            - -25            # 手機拍照容易歪 → 加大旋轉範圍 (原本 -10)
            - 25
        - type: RandomBrightnessContrast
          args:
            brightness_limit: 0.3   # 亮度 ±30% → 反光/低光環境訓練
            contrast_limit: 0.0
            p: 0.5
        - type: Resize
          args:
            size:
            - 0.5
            - 3
    - EastRandomCropData:
        size:
        - 640
        - 640
        max_tries: 50
        keep_ratio: true
    - MakeBorderMap:
        shrink_ratio: 0.4
        thresh_min: 0.3
        thresh_max: 0.7
        total_epoch: *epoch_num
    - MakeShrinkMap:
        shrink_ratio: 0.4
        min_text_size: 8
        total_epoch: *epoch_num
    - NormalizeImage:
        scale: 1./255.
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
        order: hwc
    - ToCHWImage: null
    - KeepKeys:
        keep_keys:
        - image
        - threshold_map
        - threshold_mask
        - shrink_map
        - shrink_mask
  loader:
    shuffle: true
    drop_last: false
    batch_size_per_card: 8   # 顯存不足時降為 4
    num_workers: 4           # Windows 建議設 4 以下

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: C:/Users/andy_ac_chen/Desktop/claudeProject/dataset/det/val/
    label_file_list:
      - C:/Users/andy_ac_chen/Desktop/claudeProject/dataset/det/val_label.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - DetLabelEncode: null
    - DetResizeForTest:
    - NormalizeImage:
        scale: 1./255.
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
        order: hwc
    - ToCHWImage: null
    - KeepKeys:
        keep_keys:
        - image
        - shape
        - polys
        - ignore_tags
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 1
    num_workers: 2
profiler_options: null
